<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>เก็บคำ</title>
<meta name="theme-color" content="#946237">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="static/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&family=Itim&family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<script>try{var m=localStorage.getItem("kk_theme")||"auto";var d=m==="dark"||(m==="auto"&&matchMedia("(prefers-color-scheme:dark)").matches);document.documentElement.setAttribute("data-theme",d?"dark":"light")}catch(e){}</script>
<link rel="stylesheet" href="static/style.css?v=20260721-223022">
</head>
<body>
<main>
    <div id="banner-area"></div>
    <div class="search-wrap">
        <span class="s-ico" id="search-ico"></span>
        <input type="text" class="search-box" id="search-box"
               placeholder="ค้นหาคำ… เช่น schooner หรือ เก็บแก้ว">
    </div>
    <div class="search-results" id="search-results"></div>
    <div id="hero-area"><div class="skeleton" style="height:230px;"></div></div>
    <div id="list"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>
</main>
<script>window.KK_STATIC=true;</script>
<script src="static/kk-local.js?v=20260721-223022"></script>
<script src="static/app.js?v=20260721-223022"></script>
<script>
const ICONS = {
    bar_hospitality: "🍻", knd_essence: "🎓",
    self_family: "👪", food_ordering: "🍜", travel_directions: "🧭",
    shopping: "🛍️", work_meetings: "💼", small_talk: "💬",
    phone_online: "📱", health_doctor: "🩺", emotions: "💛",
    home_routines: "🏠", entertainment_social: "🎮", money_banking: "💰",
    default: "📘"
};
const ZONE_TH = { A2: "ด่านเริ่มต้น", B1: "ด่านกลางทาง", B2: "ด่านเก๋า" };
const GOAL_RING_C = 2 * Math.PI * 27;

function greeting() {
    const h = new Date().getHours();
    if (h < 5)  return "ดึกแล้วนะ แวะมาเก็บคำก่อนนอน 🌙";
    if (h < 11) return "สวัสดีตอนเช้า ทอม ☀️";
    if (h < 17) return "สวัสดีตอนบ่าย ทอม 🌤️";
    if (h < 21) return "เย็นนี้ลุยกันหน่อย ทอม 🌆";
    return "เลิกกะแล้วใช่มั้ย เก็บคำสักหน่อย 🍺";
}

function renderHero(stats) {
    const done = Math.min(stats.reviewed_today, stats.daily_goal);
    const offset = GOAL_RING_C * (1 - done / stats.daily_goal);
    const flameCls = !stats.active_today ? "flame-off" : (done >= stats.daily_goal ? "flame-goal" : "");
    const menuSize = Math.min(20, Math.max(8, stats.due_today + 10));
    const mins = Math.max(3, Math.round(menuSize * 0.35));

    const remain = Math.max(0, stats.daily_goal - done);
    const goalPct = Math.round(done / stats.daily_goal * 100);

    const RC = 2 * Math.PI * 29;
    const roff = RC * (1 - done / stats.daily_goal);

    document.getElementById("hero-area").innerHTML = `
        <div class="hero">
          <div class="village-hero">
            <img class="vh-bg" src="static/art/village.png" alt="ฟาร์ม">
            <img class="vh-remi" src="static/art/remi.png" alt="Remi">
            <div class="vh-bubble">${greeting()}</div>
          </div>
          <div class="goal-row">
            <div class="goal-ring-wrap">
                <svg width="70" height="70" viewBox="0 0 70 70">
                    <circle cx="35" cy="35" r="29" fill="none" stroke="var(--track)" stroke-width="7"/>
                    <circle cx="35" cy="35" r="29" fill="none" stroke="#7CB342" stroke-width="7"
                        stroke-linecap="round" stroke-dasharray="${RC.toFixed(1)}" stroke-dashoffset="${roff.toFixed(1)}"
                        transform="rotate(-90 35 35)" style="transition:stroke-dashoffset .6s ease"/>
                </svg>
                <div class="gr-center"><img src="static/art/ic_basket.png" alt=""></div>
            </div>
            <div class="goal-txt">
                <div class="hg-num">เก็บผลวันนี้ <span class="hg-done">${done}</span><span class="hg-total">/${stats.daily_goal} คำ</span></div>
                <div class="hg-sub">${remain > 0 ? `อีก ${remain} ใบก็เต็มตะกร้า` : "เต็มตะกร้าแล้ว เก่งมาก!"}</div>
            </div>
            <div class="goal-div"></div>
            <div class="streak-col">
                <img src="static/art/remi.png" alt="">
                <div class="st-num">${stats.streak_days}<span> วัน</span></div>
            </div>
          </div>
          <button class="btn-primary big btn-cta" onclick="location.href='review.html?mix=1'">
              ${icon("play", "pill-ic")} เริ่มเรียนวันนี้
          </button>
          <div class="cta-sub">${stats.due_today > 0 ? `มี ${stats.due_today} คำรอทบทวน · ` : ""}ราว ${mins} นาที</div>
          ${stats.repair_offer ? `
              <button class="repair-btn" id="repair-btn">
                  ${icon("fire", "pill-ic")} ไฟดับไปเมื่อวาน — ซ่อมด้วย ${stats.repair_cost} 🥟 ให้ต่อติดเหมือนเดิม
              </button>` : ""}
        </div>`;

    const rb = document.getElementById("repair-btn");
    if (rb) rb.onclick = async () => {
        rb.disabled = true;
        try {
            const res = await apiPost("/api/streak/repair", {});
            sfx.bell();
            confetti(20);
            await refreshPills();
            main();
        } catch (e) { rb.textContent = "ซ่อมไม่สำเร็จ ลองใหม่อีกที"; rb.disabled = false; }
    };
}

/* theme → ไอคอน raster (จาก mockup) ที่มี; ที่เหลือใช้อีโมจิในช่องเดียวกัน */
const THEME_IMG = {
    small_talk: "ic_smalltalk", food_ordering: "ic_food",
    travel_directions: "ic_travel", money_banking: "coin",
    bar_hospitality: "ic_bar", self_family: "ic_family",
    health_doctor: "ic_health", shopping: "ic_shopping",
    work_meetings: "ic_work", emotions: "ic_emotions",
    home_routines: "ic_home",
};

function thaiDate() {
    try { return new Date().toLocaleDateString("th-TH", { weekday: "long", day: "numeric", month: "long" }); }
    catch (e) { return "ฟาร์มของทอม"; }
}

function renderBanner(stats) {
    const dark = () => document.documentElement.getAttribute("data-theme") === "dark";
    document.getElementById("banner-area").innerHTML = `
        <div class="farm-banner">
            <div class="fb-avatar"><img src="static/art/remi.png" alt="Remi"></div>
            <div class="fb-mid">
                <div class="fb-sub">${thaiDate()} · ฟาร์มของทอม</div>
                <div class="fb-title">เก็บคำ</div>
            </div>
            <button class="fb-coins" onclick="location.href='board.html'">
                <img src="static/art/coin.png" alt=""><span class="num">${stats.coins}</span>
            </button>
            <button class="fb-toggle" id="banner-theme" title="สลับสว่าง/มืด">${dark() ? "🌙" : "☀️"}</button>
        </div>`;
    const tb = document.getElementById("banner-theme");
    if (tb) tb.onclick = () => {
        const next = THEME_CYCLE[(THEME_CYCLE.indexOf(currentTheme()) + 1) % THEME_CYCLE.length];
        applyTheme(next);
        tb.textContent = dark() ? "🌙" : "☀️";
    };
}

function miniRing(u) {
    const pct = u.item_count ? u.collected_count / u.item_count : 0;
    if (pct >= 1) return `<span class="done-ic" title="ครบแล้ว">${icon("check")}</span>`;
    if (pct === 0) return "";
    const C = 2 * Math.PI * 12;
    return `
        <svg class="mini-ring" viewBox="0 0 30 30" title="${u.collected_count}/${u.item_count}">
            <circle class="bg" cx="15" cy="15" r="12" fill="none" stroke-width="3.5"/>
            <circle class="fg" cx="15" cy="15" r="12" fill="none" stroke-width="3.5"
                stroke-linecap="round" stroke-dasharray="${C.toFixed(1)}"
                stroke-dashoffset="${(C * (1 - pct)).toFixed(1)}" transform="rotate(-90 15 15)"/>
        </svg>`;
}

function renderUnitRow(u) {
    const complete = u.item_count > 0 && u.collected_count >= u.item_count;
    const imgName = THEME_IMG[u.theme];
    const iconHtml = imgName
        ? `<img src="static/art/${imgName}.png" alt="">`
        : (ICONS[u.theme] || ICONS.default);
    const meta = u.collected_count > 0
        ? (complete ? `เก็บครบ ${u.item_count} คำ ✓` : `เก็บแล้ว ${u.collected_count}/${u.item_count}`)
        : `${u.item_count} คำ · ยังไม่เริ่ม`;
    return `
        <div class="unit-row ${u.pinned ? "pinned" : ""} ${complete ? "complete" : ""}" data-goto="${encodeURIComponent(u.id)}">
            <div class="unit-tile">${iconHtml}</div>
            <div class="unit-info">
                <div class="unit-name">${escapeHtml(u.name_th)}</div>
                <div class="unit-meta">${meta}</div>
            </div>
            <span class="unit-chevron"><svg viewBox="0 0 8 14"><path d="M1 1l6 6-6 6" stroke="rgba(90,60,25,.32)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </div>`;
}

/* เรียง continue-first: ค้างกลางทาง > ยังไม่เริ่ม > ครบแล้ว */
function continueFirst(us) {
    const state = u => (u.collected_count > 0 && u.collected_count < u.item_count) ? 0
        : (u.collected_count === 0 ? 1 : 2);
    return us.slice().sort((a, b) => state(a) - state(b));
}

function foldSection(labelHtml, bodyHtml, open) {
    return `
        <details class="zone-fold" ${open ? "open" : ""}>
            <summary><div class="section-label"><span class="fold-arrow">▶</span> ${labelHtml}</div></summary>
            ${bodyHtml}
        </details>`;
}

function section(pill, us) {
    if (!us.length) return "";
    return `<div class="zone-pill">${pill}</div>
        <div class="unit-list">${us.map(renderUnitRow).join("")}</div>`;
}

async function main() {
    const [stats, units] = await Promise.all([apiGet("/api/stats"), apiGet("/api/units")]);

    renderBanner(stats);
    renderHero(stats);

    const pinned = units.filter(u => u.pinned);
    const core = units.filter(u => !u.pinned && u.pack_type === "core");
    const knd = units.filter(u => !u.pinned && u.pack_type === "knd");
    const trend = units.filter(u => !u.pinned && u.pack_type === "trend");

    let html = `
        <div class="practice-row">
            <a class="practice-btn" href="dictation.html?mix=1">
                <span class="pb-ico">✍️</span>
                <span><span class="pb-name">ฟังแล้วเขียน</span><span class="pb-sub"> · ฝึกหู</span></span>
            </a>
            <a class="practice-btn" href="shadow.html?mix=1">
                <span class="pb-ico">🎙️</span>
                <span><span class="pb-name">พูดตาม</span><span class="pb-sub"> · ฝึกพูด</span></span>
            </a>
        </div>`;
    if (pinned.length) html += section("📌 ปักหมุด — ใช้ได้ทุกวัน", pinned);
    if (core.length) {
        const byLevel = {};
        core.forEach(u => { (byLevel[u.cefr] = byLevel[u.cefr] || []).push(u); });
        Object.keys(byLevel).sort().forEach(level => {
            html += section(`🗺️ ${ZONE_TH[level] || level} · ${level}`, continueFirst(byLevel[level]));
        });
    }
    if (trend.length) html += section("🔥 ของสดประจำสัปดาห์", trend);
    if (knd.length) html += section("🎓 ของเด็ดจาก คำนี้ดี", continueFirst(knd));
    if (!html) html = `<div class="empty-state">ยังไม่มีบทเรียน</div>`;

    document.getElementById("list").innerHTML = html;
}

/* ---------- ค้นหาคำทั้งโหล ---------- */
let _searchTimer = null;
document.getElementById("search-ico").innerHTML = icon("search");
document.getElementById("search-box").addEventListener("input", (e) => {
    clearTimeout(_searchTimer);
    const q = e.target.value.trim();
    const box = document.getElementById("search-results");
    if (!q) { box.innerHTML = ""; return; }
    _searchTimer = setTimeout(async () => {
        try {
            const hits = await apiGet(`/api/search?q=${encodeURIComponent(q)}`);
            box.innerHTML = hits.length ? hits.map(h => `
                <div class="search-hit" data-goto="${encodeURIComponent(h.unit_id)}">
                    ${h.collected ? `<span class="sh-got">${icon("check")}</span>` : ""}
                    <div>
                        <div class="sh-en">${escapeHtml(h.text_en)}</div>
                        <div class="sh-th">${escapeHtml(h.text_th || "")}</div>
                    </div>
                    <span class="sh-unit">${escapeHtml(h.unit_name)}</span>
                </div>`).join("")
                : `<div class="search-hit" style="cursor:default;"><div class="sh-th">ยังไม่มีคำนี้ในโหล — จดไว้ที่ <a href="inbox.html">จดไว้</a> เดี๋ยวหาคำตอบให้</div></div>`;
        } catch (err) { box.innerHTML = ""; }
    }, 300);
});

document.addEventListener("click", (ev) => {
    const card = ev.target.closest("[data-goto]");
    if (card) location.href = `unit.html?id=${card.dataset.goto}`;
});

initChrome("home");
safeLoad("list", main);
</script>
</body>
</html>
