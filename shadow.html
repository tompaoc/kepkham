<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>เก็บคำ — พูดตาม</title>
<meta name="theme-color" content="#946237">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="static/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&family=Itim&family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<script>try{var m=localStorage.getItem("kk_theme")||"auto";var d=m==="dark"||(m==="auto"&&matchMedia("(prefers-color-scheme:dark)").matches);document.documentElement.setAttribute("data-theme",d?"dark":"light")}catch(e){}</script>
<link rel="stylesheet" href="static/style.css?v=20260721-225119">
</head>
<body>
<main>
    <div id="shadow-area"><div class="skeleton" style="height:340px;"></div></div>
</main>
<script>window.KK_STATIC=true;</script>
<script src="static/kk-local.js?v=20260721-225119"></script>
<script src="static/app.js?v=20260721-225119"></script>
<script>
let queue = [];
let idx = 0;
let session = { done: 0, scoreSum: 0 };
const params = new URLSearchParams(location.search);
const LIMIT = parseInt(params.get("limit")) || 10;

let mediaStream = null, recorder = null, chunks = [], myUrl = null, myAudio = null, recording = false;

const REC_SUPPORTED = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.MediaRecorder);

function pickMime() {
    for (const m of ["audio/mp4", "audio/webm", "audio/webm;codecs=opus"])
        if (window.MediaRecorder && MediaRecorder.isTypeSupported(m)) return m;
    return "";
}

function renderCard() {
    const el = document.getElementById("shadow-area");
    if (idx >= queue.length) { finishSession(); return; }
    const card = queue[idx];
    const voice = voiceFor(card, card.unit_id);
    if (myUrl) { URL.revokeObjectURL(myUrl); myUrl = null; }

    el.innerHTML = `
        <div class="progress-bar"><div style="width:${(idx / queue.length) * 100}%"></div></div>
        <div class="card shadow-card">
            <div class="fc-meta">${idx + 1} / ${queue.length} · ${escapeHtml(card.unit_name || "")} · 🎙️ พูดตาม</div>

            <button class="dict-listen" id="model-btn" title="ฟังต้นฉบับ">${icon("speaker")}</button>
            <div style="display:flex; gap:8px; justify-content:center; margin:2px 0 12px;">
                <button class="play-btn slow" data-say="${escapeHtml(card.text_en)}" data-voice="${voice}" data-rate="slow" title="ช้า">🐢</button>
                <button class="play-btn" data-say="${escapeHtml(card.text_en)}" data-voice="${voice}" title="ปกติ">${icon("play")}</button>
            </div>

            <div class="shadow-en">${escapeHtml(card.text_en)}</div>
            <div class="shadow-th">${escapeHtml(card.text_th || "")}</div>

            ${REC_SUPPORTED ? `
            <button class="shadow-rec" id="rec-btn"><span class="rec-dot"></span><span id="rec-label">อัดเสียงเรา</span></button>
            <div class="shadow-compare" id="compare" style="display:none;">
                <button class="cmp-btn" id="cmp-model">${icon("speaker", "pill-ic")} ต้นฉบับ</button>
                <button class="cmp-btn me" id="cmp-me">${icon("mic", "pill-ic")} เสียงเรา</button>
            </div>
            <div class="shadow-rate" id="rate" style="display:none;">
                <p class="rate-q">พูดตามใกล้เคียงแค่ไหน?</p>
                <div class="rate-row">
                    <button class="ra danger" data-score="40">ยังไม่ชัด</button>
                    <button class="ra" data-score="70">พอได้</button>
                    <button class="ra green" data-score="100">เป๊ะ!</button>
                </div>
            </div>`
            : `<div class="fc-note" style="margin-top:16px;">🎤 เบราว์เซอร์นี้อัดเสียงไม่ได้ — ฟังต้นฉบับแล้วพูดตามออกเสียงเองได้เลย</div>
               <button class="btn-primary big" id="skip-btn" style="margin-top:14px;">${icon("play","pill-ic")} ถัดไป</button>`}
        </div>`;

    document.getElementById("model-btn").onclick = () => playAudio(card.text_en, voice);
    // เล่นต้นฉบับให้ฟังทันที 1 ครั้ง
    playAudio(card.text_en, voice);
    prefetchNext();

    if (!REC_SUPPORTED) {
        document.getElementById("skip-btn").onclick = () => { session.done++; session.scoreSum += 70; next(); };
        return;
    }

    const recBtn = document.getElementById("rec-btn");
    recBtn.onclick = () => recording ? stopRec() : startRec();
    document.getElementById("cmp-model").onclick = () => playAudio(card.text_en, voice);
    document.getElementById("cmp-me").onclick = () => { if (myUrl) { myAudio = new Audio(myUrl); myAudio.play().catch(() => {}); } };
    document.querySelectorAll("[data-score]").forEach(b => b.onclick = () => {
        session.done++; session.scoreSum += parseInt(b.dataset.score);
        if (parseInt(b.dataset.score) >= 70) sfx.correct(); else sfx.wrong();
        next();
    });
}

async function startRec() {
    const recBtn = document.getElementById("rec-btn");
    try {
        if (!mediaStream) mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (e) {
        document.getElementById("rec-label").textContent = "ไม่ได้สิทธิ์ไมค์ 🙏";
        return;
    }
    chunks = [];
    const mt = pickMime();
    try { recorder = new MediaRecorder(mediaStream, mt ? { mimeType: mt } : undefined); }
    catch (e) { recorder = new MediaRecorder(mediaStream); }
    recorder.ondataavailable = (e) => { if (e.data && e.data.size) chunks.push(e.data); };
    recorder.onstop = () => {
        const blob = new Blob(chunks, { type: recorder.mimeType || "audio/mp4" });
        if (myUrl) URL.revokeObjectURL(myUrl);
        myUrl = URL.createObjectURL(blob);
        document.getElementById("compare").style.display = "flex";
        document.getElementById("rate").style.display = "block";
        // เล่นเสียงเราให้ฟังทันทีเทียบกับที่เพิ่งได้ยิน
        myAudio = new Audio(myUrl); myAudio.play().catch(() => {});
    };
    recorder.start();
    recording = true;
    recBtn.classList.add("on");
    document.getElementById("rec-label").textContent = "กำลังอัด… แตะเพื่อหยุด";
}

function stopRec() {
    if (recorder && recorder.state !== "inactive") recorder.stop();
    recording = false;
    const recBtn = document.getElementById("rec-btn");
    if (recBtn) { recBtn.classList.remove("on"); document.getElementById("rec-label").textContent = "อัดใหม่"; }
}

function next() { idx++; renderCard(); refreshPills(); }

function prefetchNext() {
    const nxt = queue[idx + 1];
    if (!nxt) return;
    fetch(`/api/tts?text=${encodeURIComponent(nxt.text_en)}&voice=${voiceFor(nxt, nxt.unit_id)}&rate=normal`).catch(() => {});
}

function releaseMic() {
    try { if (mediaStream) mediaStream.getTracks().forEach(t => t.stop()); } catch (e) {}
    mediaStream = null;
}

async function finishSession() {
    releaseMic();
    const el = document.getElementById("shadow-area");
    if (session.done === 0) {
        el.innerHTML = `<div class="empty-state"><div style="font-size:44px;">🎙️</div>
            <p style="font-size:17px; margin:10px 0 4px;">ยังไม่มีประโยคให้ฝึกพูดตอนนี้</p>
            <button class="btn-primary" onclick="location.href='index.html'" style="max-width:220px; margin:10px auto 0;">กลับหน้าหลัก</button></div>`;
        return;
    }
    const avg = Math.round(session.scoreSum / session.done);
    el.innerHTML = `<div class="card" style="text-align:center; padding:36px 20px;">
        <div style="font-size:50px;">🗣️</div>
        <h2 style="margin:8px 0 4px;">จบรอบพูดตาม!</h2>
        <p style="margin:4px 0;"><span class="num" style="font-size:26px;">${session.done}</span> ประโยค · ประเมินตัวเอง <span class="num" style="font-size:26px; color:var(--green-deep);">${avg}%</span></p>
        <p id="stamp-line" style="font-size:13.5px; color:var(--ink-soft); min-height:20px;"></p>
        <div style="display:flex; gap:10px; justify-content:center; margin-top:14px;">
            <button class="secondary" onclick="location.href='index.html'">กลับหน้าหลัก</button>
            <button class="btn-primary" style="max-width:150px;" onclick="location.reload()">ต่ออีกรอบ</button>
        </div>
    </div>`;
    sfx.fanfare();
    confetti(40);
    try {
        const res = await apiPost("/api/earn", { stamp_source: "review_session" });
        const stats = await refreshPills();
        const lines = [];
        if (res.stamp_awarded) lines.push("ได้แสตมป์ +1 📮");
        document.getElementById("stamp-line").textContent = lines.join(" · ");
        celebrateUnlocks(res.newly_unlocked);
    } catch (e) {}
}

window.addEventListener("pagehide", releaseMic);

initChrome("shadow");
safeLoad("shadow-area", async () => {
    queue = await apiGet(`/api/today?limit=${LIMIT}`);
    queue = (queue || []).filter(c => c.text_en && c.text_en.trim());
    idx = 0;
    renderCard();
});
</script>
</body>
</html>
