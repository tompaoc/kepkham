<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>เก็บคำ — จดจากที่ทำงาน</title>
<meta name="theme-color" content="#946237">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="static/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&family=Itim&family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<script>try{var m=localStorage.getItem("kk_theme")||"auto";var d=m==="dark"||(m==="auto"&&matchMedia("(prefers-color-scheme:dark)").matches);document.documentElement.setAttribute("data-theme",d?"dark":"light")}catch(e){}</script>
<link rel="stylesheet" href="static/style.css?v=20260721-202037">
</head>
<body>
<main>
    <div class="card">
        <p style="margin:0 0 10px;">ได้ยินคำ/ประโยคที่บาร์แล้วไม่เข้าใจ? พิมพ์ไว้ตรงนี้เลย
        (สะกดผิดได้ พิมพ์ตามเสียงที่ได้ยินก็ได้) — เดี๋ยวเอาไปถาม Claude ในแชทให้อธิบาย
        แล้วจะถูกเพิ่มเข้าแพ็ค Bar Life ให้</p>
        <textarea id="raw-input" rows="3" placeholder="เช่น: coworker บอกว่า 'yer man's gone walkabout' ไม่เข้าใจ"></textarea>
        <button class="gold" id="submit-btn" style="margin-top:10px;">📝 บันทึก</button>
    </div>
    <div class="section-label">📋 ที่จดไว้</div>
    <div id="list"><div class="skeleton"></div></div>
</main>
<script>window.KK_STATIC=true;</script>
<script src="static/kk-local.js?v=20260721-202037"></script>
<script src="static/app.js?v=20260721-202037"></script>
<script>
async function submitEntry() {
    const el = document.getElementById("raw-input");
    if (!el.value.trim()) return;
    const btn = document.getElementById("submit-btn");
    btn.disabled = true;
    try {
        await apiPost("/api/heard-at-work", { raw_text: el.value.trim() });
        el.value = "";
        sfx.correct();
        await loadList();
    } finally { btn.disabled = false; }
}

async function loadList() {
    const rows = await apiGet("/api/heard-at-work");
    const el = document.getElementById("list");
    if (!rows.length) {
        el.innerHTML = `<div class="empty-state">ยังไม่มีอะไรจดไว้ — ได้ยินอะไรที่บาร์ก็จดมาเลย 🍻</div>`;
        return;
    }
    el.innerHTML = rows.map(r => `
        <div class="card">
            <div style="font-size:15px;">${escapeHtml(r.raw_text)}</div>
            ${r.status === "explained" && r.answer_en ? `
                <div style="margin-top:10px; padding-top:10px; border-top:1px dashed var(--line);">
                    <div class="item-en" style="font-size:16px;">${escapeHtml(r.answer_en)}</div>
                    <div class="item-th">${escapeHtml(r.answer_th || "")}</div>
                    ${r.answer_note ? `<div class="item-note">💡 ${escapeHtml(r.answer_note)}</div>` : ""}
                    <a href="unit.html?id=bar_life" style="font-size:12.5px; color:var(--green); font-weight:700; text-decoration:none;">✓ อยู่ในโหล Bar Life แล้ว — ไปดู/เก็บเข้า SRS</a>
                </div>
            ` : ""}
            <div style="font-size:12px; color:var(--ink-soft); margin-top:8px;">
                ${r.status === "pending" ? "⏳ รอเอาไปถามในแชท (พิมพ์ \"เคลียร์ inbox\" กับ Claude)" : "✅ อธิบายแล้ว"}
                &nbsp;·&nbsp; ${new Date(r.created_at).toLocaleDateString("th-TH")}
            </div>
        </div>
    `).join("");
}

document.getElementById("submit-btn").onclick = submitEntry;
initChrome("inbox");
safeLoad("list", loadList);
</script>
</body>
</html>
